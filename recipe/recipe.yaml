schema_version: 1

context:
  name: zppy
  version: 3.2.0rc1
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/E3SM-Project/zppy/archive/v${{ version }}.tar.gz
  sha256: 329188de301fa46c3681ce10886f3c4a8c5eeabe2bd627037679a00c906db79a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  python:
    entry_points:
      - zppy = zppy.__main__:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }},<3.15
    - configobj >=5.0.6
    - jinja2 >=3.1.2
    - mache >=1.5.0
    - mpas_tools >=0.15.0
    - pillow >=9.2.0

tests:
  - python:
      imports:
        - zppy
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - zppy --help

about:
  homepage: https://github.com/E3SM-Project/zppy
  summary: E3SM post-processing toolchain
  license: BSD-3-Clause AND LicenseRef-zppy-NOTICE
  license_file:
    - LICENSE
    - NOTICE

extra:
  recipe-maintainers:
    - andrewdnolan
    - mahf708
    - xylar
    - tomvothecoder
    - forsyth2
    - chengzhuzhang
